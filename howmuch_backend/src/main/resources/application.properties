spring.application.name=howmuch_backend
# Render 환경에서는 PORT 환경변수를 자동으로 주입해 줌. 로컬에서는 8081 사용
server.port=${PORT:8081}
# Firebase 설정 경로 (Render에서는 Secret File로 주입, 로컬에서는 classpath 사용)
firebase.config.path=${FIREBASE_CONFIG_PATH:classpath:firebase-service-account.json}
server.compression.enabled=true
server.compression.mime-types=application/json
server.compression.min-response-size=1024

# 세션 토큰 (HMAC-SHA256). 운영 환경에서는 SESSION_SECRET 환경변수로 반드시 덮어쓸 것
session.secret=${SESSION_SECRET:dev-only-howmuch-session-secret-change-me}
session.ttl-hours=${SESSION_TTL_HOURS:168}

# 공공데이터 매장 캐시 (Firestore 일일 읽기 한도 보호)
# 부팅 로드: 디스크 스냅샷→classpath→Firestore 순. 갱신은 1시간 주기로 확인하되
# 마지막 성공 후 24시간 내엔 Firestore 미호출 (일일 읽기 ~1.1만 1회, 실패 시 1시간 뒤 재시도)
stores.snapshot.path=${STORES_SNAPSHOT_PATH:data/stores-snapshot.json}
stores.refresh.initial-delay-ms=600000
stores.refresh.delay-ms=3600000
stores.user.refresh.initial-delay-ms=300000
stores.user.refresh.delay-ms=600000
