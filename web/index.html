<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="howmuch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>howmuch</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
  <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=949e657c37f55074dbb2a14ceb273e2b&libraries=services,clusterer&autoload=false"></script>
  <script>
    window.kakaoMapObjects = {};

    function initKakaoMap(containerId, lat, lng) {
      if (typeof kakao === 'undefined' || !kakao.maps) {
        setTimeout(function() { initKakaoMap(containerId, lat, lng); }, 200);
        return;
      }

      var loadCheckTimer = setTimeout(function() {
        alert("🚨 카카오맵 인증 실패! 카카오 디벨로퍼스에 등록되지 않은 포트(예: " + location.port + ")를 사용 중입니다.\n터미널에서 flutter run -d chrome --web-port 8080 명령어로 실행해주세요!");
      }, 2500);

      kakao.maps.load(function() {
        clearTimeout(loadCheckTimer);
        var container = window[containerId] || document.getElementById(containerId);
        
        if (!container) {
          alert("🚨 에러: 카카오맵을 담을 HTML 컨테이너(div)를 찾을 수 없습니다!");
          setTimeout(function() { initKakaoMap(containerId, lat, lng); }, 100);
          return;
        }

        if (container.offsetWidth === 0 || container.offsetHeight === 0) {
          alert("🚨 에러: 카카오맵 컨테이너의 가로/세로 크기가 0입니다! (Positioned.fill 미적용 오류)");
        }

        var options = {
          center: new kakao.maps.LatLng(lat, lng),
          level: 3
        };
        var map = new kakao.maps.Map(container, options);
        window.kakaoMapObjects[containerId] = map;

        // 💡 클러스터러 초기화
        window.kakaoMapObjects[containerId + '_clusterer'] = new kakao.maps.MarkerClusterer({
          map: map,
          averageCenter: true,
          minLevel: 6
        });
        
        console.log("Kakao Map & Clusterer Initialized!");
      });
    }

    function addKakaoMarkers(containerId, markerListJson) {
      if (typeof kakao === 'undefined' || !kakao.maps) {
        setTimeout(function() { addKakaoMarkers(containerId, markerListJson); }, 200);
        return;
      }
      kakao.maps.load(function() {
        var map = window.kakaoMapObjects[containerId];
        var clusterer = window.kakaoMapObjects[containerId + '_clusterer'];
        
        // 💡 지도가 아직 생성 전이면 200ms 후 재시도
        if (!map || !clusterer) {
          setTimeout(function() { addKakaoMarkers(containerId, markerListJson); }, 200);
          return;
        }

        var markerData = JSON.parse(markerListJson);
        console.log("Adding markers to map: " + markerData.length + " items");

        var markers = markerData.map(function(item) {
          return new kakao.maps.Marker({
            position: new kakao.maps.LatLng(item.lat, item.lng),
            title: item.title
          });
        });

        clusterer.clear();
        clusterer.addMarkers(markers);
        console.log("Markers added successfully!");
      });
    }

    function setKakaoMapCenter(containerId, lat, lng) {
      var map = window.kakaoMapObjects[containerId];
      if (map) map.setCenter(new kakao.maps.LatLng(lat, lng));
    }

    function setKakaoMapCenterFromSwipe(containerId, lat, lng) {
      var map = window.kakaoMapObjects[containerId];
      if (map) map.panTo(new kakao.maps.LatLng(lat, lng));
    }

    function updateUserLocationMarker(containerId, lat, lng) {
      var map = window.kakaoMapObjects[containerId];
      if (!map) return;
      if (!window.userMarker) {
        window.userMarker = new kakao.maps.Marker({
          position: new kakao.maps.LatLng(lat, lng),
          map: map
        });
      } else {
        window.userMarker.setPosition(new kakao.maps.LatLng(lat, lng));
      }
    }

    // 💡 Flutter가 현재 지도의 보이는 범위를 가져갈 수 있도록 지원하는 함수
    function getKakaoMapBounds(containerId) {
      var map = window.kakaoMapObjects[containerId];
      if (!map) return null;

      var bounds = map.getBounds();
      var sw = bounds.getSouthWest();
      var ne = bounds.getNorthEast();

      return JSON.stringify({
        minLat: sw.getLat(),
        maxLat: ne.getLat(),
        minLng: sw.getLng(),
        maxLng: ne.getLng()
      });
    }
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
